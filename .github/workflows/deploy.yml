name: Deploy to AWS (S3 + CloudFront)

on:
  push:
    branches: [main, dev]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        type: choice
        options: [production, development]
        default: production

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  test:
    name: Test
    if: github.ref_name == 'main' || github.event.inputs.environment == 'production'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: "stable"
          cache: true
      - run: flutter pub get
      - run: flutter analyze --no-fatal-infos
      - run: flutter test test/unit/ --reporter=compact

  deploy:
    name: Deploy (${{ github.event.inputs.environment || (github.ref_name == 'main' && 'production' || 'development') }})
    needs: [test]
    if: always() && (needs.test.result == 'success' || needs.test.result == 'skipped')
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || (github.ref_name == 'main' && 'production' || 'development') }}
    env:
      TF_WORKSPACE: ${{ vars.TF_WORKSPACE }}

    outputs:
      site_url: ${{ steps.tf.outputs.site_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # ── Flutter build ─────────────────────────────────────────────────────────
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: "stable"
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build web
        run: |
          flutter build web --release \
            --dart-define=API_BASE_URL=${{ vars.PLATFORM_API_URL }} \
            --dart-define=SUPABASE_URL=${{ secrets.DART_DEFINE_SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.DART_DEFINE_SUPABASE_ANON_KEY }} \
            --dart-define=MOCK_MODE=false

      # ── AWS credentials (OIDC) ────────────────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      # ── Terraform ─────────────────────────────────────────────────────────────
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.9.0
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      # First deploy only: creates ACM cert so we can read the validation CNAMEs.
      # Subsequent deploys: this is a no-op (cert already exists).
      - name: Terraform Apply (ACM cert)
        working-directory: terraform
        run: terraform apply -auto-approve -target=aws_acm_certificate.app

      # Add these CNAMEs to Cloudflare (DNS-only, no proxy) if not already present.
      # The next step will block until the cert reaches ISSUED state.
      - name: ACM validation CNAMEs
        working-directory: terraform
        run: terraform output -json acm_certificate_validation_records

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve

      # ── Get terraform outputs ─────────────────────────────────────────────────
      - name: Get Terraform outputs
        id: tf
        working-directory: terraform
        run: |
          echo "bucket=$(terraform output -raw s3_bucket_name)" >> $GITHUB_OUTPUT
          echo "dist_id=$(terraform output -raw cloudfront_distribution_id)" >> $GITHUB_OUTPUT
          echo "site_url=$(terraform output -raw site_url)" >> $GITHUB_OUTPUT

      # ── Deploy to S3 ──────────────────────────────────────────────────────────
      # Flutter hashes asset filenames → all assets get long-lived cache.
      # Entry points with fixed names (no hash) must revalidate on every load.
      - name: Sync assets to S3 (long-lived cache)
        run: |
          aws s3 sync build/web s3://${{ steps.tf.outputs.bucket }} \
            --delete \
            --exclude "index.html" \
            --cache-control "public, max-age=31536000, immutable"

      - name: Upload index.html (no-cache)
        run: |
          aws s3 cp build/web/index.html s3://${{ steps.tf.outputs.bucket }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Fix cache headers for unhashed entry points
        run: |
          BUCKET="s3://${{ steps.tf.outputs.bucket }}"
          for f in main.dart.js flutter_bootstrap.js flutter_service_worker.js manifest.json; do
            aws s3 cp "$BUCKET/$f" "$BUCKET/$f" \
              --metadata-directive REPLACE \
              --cache-control "no-cache, must-revalidate" \
              --content-type "$([ "$f" = "manifest.json" ] && echo 'application/json' || echo 'application/javascript')"
          done

      # ── Invalidate CloudFront ─────────────────────────────────────────────────
      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.tf.outputs.dist_id }} \
            --paths "/*"

      # ── Purge Cloudflare edge cache ───────────────────────────────────────────
      # Cloudflare sits in front of CloudFront; without this step the old bundle
      # stays at Cloudflare's edge until TTL expires even after CloudFront is clean.
      # Requires CF_ZONE_ID (var) and CF_API_TOKEN (secret, Cache Purge permission).
      - name: Purge Cloudflare cache
        if: vars.CF_ZONE_ID != ''
        env:
          CF_ZONE_ID: ${{ vars.CF_ZONE_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          RESPONSE=$(curl -s -X POST \
            "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/purge_cache" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}')
          echo "$RESPONSE"
          if echo "$RESPONSE" | grep -q '"success":true'; then
            echo "✅ Cloudflare cache purged"
          else
            echo "❌ Cloudflare purge failed — verifica CF_ZONE_ID y CF_API_TOKEN"
            exit 1
          fi

  # ── Notify ────────────────────────────────────────────────────────────────────
  notify:
    name: notify
    needs: [test, deploy]
    if: always()
    uses: conectamos-mx/.github/.github/workflows/notification.yml@main
    with:
      status: ${{ (needs.test.result == 'success' || needs.test.result == 'skipped') && needs.deploy.result == 'success' && 'success' || 'failure' }}
      environment: ${{ (github.event.inputs.environment == 'production' || (github.event.inputs.environment == '' && github.ref_name == 'main')) && 'Production' || 'Development' }}
      service_name: "conectamos-platform"
      service_url: ${{ needs.deploy.result == 'success' && ((github.event.inputs.environment == 'production' || (github.event.inputs.environment == '' && github.ref_name == 'main')) && 'https://platform.conectamos.ai' || 'https://platform-dev.conectamos.ai') || 'N/A' }}
      commit_sha: ${{ github.sha }}
      actor: ${{ github.actor }}
      run_id: ${{ github.run_id }}
      repository: ${{ github.repository }}
    secrets: inherit
